<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamil Inventory Cloud | v5.0 Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .row-ok { border-left: 5px solid #10b981; background-color: #f0fdf4; }
        .row-pending { border-left: 5px solid #ef4444; background-color: #fff; }
        .btn-loading { cursor: not-allowed; opacity: 0.7; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-10 text-slate-900">

    <header class="bg-slate-900 text-white shadow-xl sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-extrabold tracking-tighter text-blue-400">GAMIL <span class="text-white">CLOUD</span></h1>
                <p class="text-[10px] uppercase tracking-widest opacity-60 font-bold">Sistema de Sincronização em Massa</p>
            </div>
            <div id="sync-indicator" class="flex items-center gap-2 bg-slate-800 px-3 py-1 rounded-full border border-slate-700">
                <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                <span class="text-[10px] font-bold text-slate-300 uppercase">Cloud Online</span>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6 max-w-4xl">
        
        <nav class="flex bg-white rounded-xl p-1 shadow-sm mb-6 border border-slate-200">
            <button onclick="switchTab('import')" id="btn-import" class="flex-1 py-3 rounded-lg text-sm font-bold bg-slate-900 text-white transition-all">1. CARGA EXCEL</button>
            <button onclick="switchTab('scan')" id="btn-scan" class="flex-1 py-3 rounded-lg text-sm font-bold text-slate-500 transition-all">2. MODO PDA</button>
            <button onclick="switchTab('history')" id="btn-history" class="flex-1 py-3 rounded-lg text-sm font-bold text-slate-500 transition-all">3. HISTÓRICO</button>
        </nav>

        <section id="sec-import" class="block space-y-4">
            <div class="bg-white rounded-2xl shadow-xl border border-slate-200 p-6">
                <h2 class="text-lg font-bold mb-1 text-slate-800">Importação em Lote</h2>
                <p class="text-xs text-slate-500 mb-4">Suporta até 10.000 bultos. O sistema remove duplicados e sincroniza em blocos de segurança.</p>
                
                <textarea id="bultos-input" rows="8" 
                    class="w-full p-4 border-2 border-slate-100 rounded-xl bg-slate-50 font-mono text-xs mb-4 focus:border-blue-500 outline-none transition-all" 
                    placeholder="Cole as colunas aqui..."></textarea>
                
                <div class="flex flex-col md:flex-row gap-3">
                    <button id="btn-process" onclick="processImport()" class="flex-[2] bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700 transition-all">
                        SINCRONIZAR COM A NUVEM
                    </button>
                    <button onclick="purgeCloud()" class="flex-1 bg-red-50 text-red-600 font-bold rounded-xl border border-red-100 hover:bg-red-100 transition-all">
                        LIMPAR NUVEM
                    </button>
                </div>
            </div>
        </section>

        <section id="sec-scan" class="hidden space-y-4">
            <div class="bg-white rounded-2xl shadow-xl border-4 border-blue-600 p-4">
                <input type="text" id="pda-input" class="w-full p-4 text-3xl text-center font-black bg-slate-50 rounded-xl outline-none" placeholder="AGUARDANDO SCAN" autofocus>
                <div id="pda-feedback" class="hidden mt-4 p-4 rounded-xl text-center font-bold text-lg"></div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-white p-4 rounded-xl border border-slate-200 text-center shadow-sm">
                    <span class="text-[9px] font-bold text-slate-400 uppercase block font-bold">Registrados</span>
                    <span id="count-total" class="text-xl font-black">0</span>
                </div>
                <div class="bg-emerald-600 p-4 rounded-xl text-white text-center shadow-md">
                    <span class="text-[9px] font-bold opacity-80 uppercase block font-bold">Lidos (OK)</span>
                    <span id="count-scanned" class="text-xl font-black">0</span>
                </div>
                <div class="bg-rose-500 p-4 rounded-xl text-white text-center shadow-md">
                    <span class="text-[9px] font-bold opacity-80 uppercase block font-bold">Faltantes</span>
                    <span id="count-missing" class="text-xl font-black">0</span>
                </div>
                <div class="bg-white p-4 rounded-xl border border-slate-200 text-center shadow-sm">
                    <span class="text-[9px] font-bold text-slate-400 uppercase block font-bold">Status</span>
                    <span id="count-percent" class="text-xl font-black text-slate-800">0%</span>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-md border border-slate-200 overflow-hidden">
                <div class="p-3 bg-slate-50 border-b flex justify-between items-center">
                    <div class="flex gap-1">
                        <button onclick="renderList('all')" class="px-3 py-1.5 text-[10px] font-bold rounded bg-white border">TUDO</button>
                        <button onclick="renderList('pending')" class="px-3 py-1.5 text-[10px] font-bold rounded bg-white border text-red-500 uppercase">Faltantes</button>
                    </div>
                    <button onclick="saveSessionToHistory()" class="bg-slate-800 text-white text-[10px] px-4 py-2 rounded-lg font-bold hover:bg-black uppercase">Fechar Inventário</button>
                </div>
                <div id="inventory-list" class="max-h-[450px] overflow-y-auto divide-y divide-slate-100 font-mono text-sm"></div>
            </div>
        </section>

        <section id="sec-history" class="hidden space-y-4">
            <div class="bg-white rounded-2xl shadow-xl border border-slate-200 p-6 text-center">
                <h2 class="text-lg font-bold mb-4">Histórico Mensal</h2>
                <div id="history-container" class="space-y-3"></div>
            </div>
        </section>
    </main>

    <script>
        // CONFIGURAÇÃO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBEJpvsh0A2wFIMINGLJx7L0jrXXLcRizk",
            authDomain: "gamil-inventory.firebaseapp.com",
            projectId: "gamil-inventory",
            storageBucket: "gamil-inventory.firebasestorage.app",
            messagingSenderId: "1057783338000",
            appId: "1:1057783338000:web:09d77f4736d2416bd42695",
            measurementId: "G-E87JYRBDPL"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const bultosRef = db.collection("bultos_gamil");
        const histRef = db.collection("historico_gamil");

        let currentData = {};
        let activeFilter = 'all';

        // SINCRONIZAÇÃO EM TEMPO REAL
        bultosRef.onSnapshot((snapshot) => {
            currentData = {};
            snapshot.forEach(doc => currentData[doc.id] = doc.data());
            renderList(activeFilter);
        });

        // CARGA INDUSTRIAL COM PAUSA (Fatiamento de 500 em 500)
        async function processImport() {
            const raw = document.getElementById('bultos-input').value;
            const lines = raw.split(/[\n\r,]+/).map(l => l.trim()).filter(l => l !== "");
            const uniqueBultos = [...new Set(lines)];

            if(uniqueBultos.length === 0) return alert("Erro: Lista vazia.");

            const btn = document.getElementById('btn-process');
            btn.disabled = true;
            btn.classList.add('btn-loading');
            
            const chunkSize = 500;
            const totalChunks = Math.ceil(uniqueBultos.length / chunkSize);

            try {
                for (let i = 0; i < uniqueBultos.length; i += chunkSize) {
                    const chunk = uniqueBultos.slice(i, i + chunkSize);
                    const batch = db.batch();
                    
                    const progress = Math.round(((Math.floor(i/chunkSize) + 1) / totalChunks) * 100);
                    btn.innerText = `SINCRO: ${progress}% (LOTE ${Math.floor(i/chunkSize) + 1} DE ${totalChunks})`;

                    chunk.forEach(code => {
                        const ref = bultosRef.doc(code);
                        batch.set(ref, { status: 'pending', time: null }, { merge: true });
                    });

                    await batch.commit();
                    // PAUSA TÉCNICA: Dá tempo ao navegador para não travar
                    await new Promise(resolve => setTimeout(resolve, 300));
                }

                btn.innerText = "✅ SINCRONIZAÇÃO COMPLETA!";
                btn.style.backgroundColor = "#059669";
                
                setTimeout(() => {
                    alert(`Sucesso: ${uniqueBultos.length} bultos processados.`);
                    btn.innerText = "SINCRONIZAR COM A NUVEM";
                    btn.style.backgroundColor = "#2563eb";
                    btn.disabled = false;
                    btn.classList.remove('btn-loading');
                    document.getElementById('bultos-input').value = "";
                    switchTab('scan');
                }, 1500);

            } catch (error) {
                console.error(error);
                alert("Erro ao enviar. Verifique se as REGRAS do Firebase foram publicadas como 'if true;'.");
                btn.disabled = false;
                btn.innerText = "TENTAR NOVAMENTE";
            }
        }

        // LÓGICA PDA
        const pdaInput = document.getElementById('pda-input');
        pdaInput.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const code = pdaInput.value.trim();
                if(code) await validateScan(code);
                pdaInput.value = "";
            }
        });

        async function validateScan(code) {
            const f = document.getElementById('pda-feedback');
            f.className = "mt-4 p-4 rounded-xl text-center font-bold text-lg block animate-bounce";
            
            if (currentData[code]) {
                if (currentData[code].status === 'ok') {
                    f.innerText = "⚠️ JÁ LIDO: " + code;
                    f.classList.add('bg-amber-500', 'text-white');
                    beep(300, 0.1);
                } else {
                    await bultosRef.doc(code).update({ status: 'ok', time: new Date().toLocaleString() });
                    f.innerText = "✅ CONFIRMADO: " + code;
                    f.classList.add('bg-emerald-600', 'text-white');
                    beep(600, 0.1);
                }
            } else {
                f.innerText = "❌ NÃO CONSTA: " + code;
                f.classList.add('bg-rose-600', 'text-white');
                beep(150, 0.5);
            }
        }

        function renderList(filter) {
            activeFilter = filter;
            const container = document.getElementById('inventory-list');
            container.innerHTML = "";
            let counts = { total: 0, ok: 0 };

            Object.keys(currentData).sort().reverse().forEach(key => {
                counts.total++;
                const item = currentData[key];
                if(item.status === 'ok') counts.ok++;
                
                if(filter !== 'all' && item.status !== filter) return;

                const div = document.createElement('div');
                div.className = `p-3 flex justify-between items-center ${item.status === 'ok' ? 'row-ok' : 'row-pending'}`;
                div.innerHTML = `<span class="font-bold">${key}</span>
                                 <span class="text-[9px] font-black uppercase px-2 py-1 rounded border ${item.status === 'ok' ? 'border-emerald-200 text-emerald-600' : 'border-rose-100 text-rose-500'}">${item.status === 'ok' ? 'Lido' : 'Falta'}</span>`;
                container.appendChild(div);
            });

            document.getElementById('count-total').innerText = counts.total;
            document.getElementById('count-scanned').innerText = counts.ok;
            document.getElementById('count-missing').innerText = counts.total - counts.ok;
            document.getElementById('count-percent').innerText = counts.total > 0 ? Math.round((counts.ok / counts.total)*100) + "%" : "0%";
        }

        async function saveSessionToHistory() {
            const picados = Object.keys(currentData).filter(k => currentData[k].status === 'ok');
            if(picados.length === 0) return alert("Nenhum item picado.");
            if(confirm("Deseja fechar o mês?")) {
                await histRef.add({ date: new Date().toLocaleDateString(), total: picados.length, ts: Date.now() });
                alert("Arquivado!");
                switchTab('history');
            }
        }

        function renderHistory() {
            histRef.orderBy('ts', 'desc').get().then(snap => {
                const container = document.getElementById('history-container');
                container.innerHTML = "";
                if(snap.empty) container.innerHTML = "Vazio.";
                snap.forEach(doc => {
                    const h = doc.data();
                    container.innerHTML += `<div class="p-4 border rounded-xl flex justify-between bg-white shadow-sm mb-2">
                        <span class="font-bold">${h.date}</span><span class="font-bold text-emerald-600">${h.total} BULTOS</span>
                    </div>`;
                });
            });
        }

        async function purgeCloud() {
            if(confirm("⚠️ APAGAR TUDO DA NUVEM?")) {
                const snap = await bultosRef.get();
                const batch = db.batch();
                snap.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
                alert("Nuvem vazia.");
            }
        }

        function switchTab(tab) {
            ['import', 'scan', 'history'].forEach(t => {
                document.getElementById(`sec-${t}`).classList.add('hidden');
                document.getElementById(`btn-${t}`).className = 'flex-1 py-3 rounded-lg text-sm font-bold text-slate-500';
            });
            document.getElementById(`sec-${tab}`).classList.remove('hidden');
            document.getElementById(`btn-${tab}`).className = 'flex-1 py-3 rounded-lg text-sm font-bold bg-slate-900 text-white shadow-md';
            if(tab === 'scan') setTimeout(() => pdaInput.focus(), 200);
            if(tab === 'history') renderHistory();
        }

        function beep(f, d) {
            try { const c = new AudioContext(); const o = c.createOscillator(); const g = c.createGain(); o.connect(g); g.connect(c.destination); o.frequency.value = f; o.start(); setTimeout(() => o.stop(), d * 1000); } catch(e) {}
        }
    </script>
</body>
</html>
