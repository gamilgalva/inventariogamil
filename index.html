<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamil Inventory Pro | v9.0 Local Load</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <script src="dados.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .row-ok { border-left: 5px solid #10b981; background-color: #f0fdf4; }
        .row-pending { border-left: 5px solid #ef4444; background-color: #fff; }
        @media print {
            .no-print { display: none !important; }
            body { background-color: white !important; }
            #inventory-list { max-height: none !important; overflow: visible !important; }
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-10">

    <header class="bg-slate-900 text-white p-4 shadow-xl no-print">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black text-blue-400">GAMIL <span class="text-white">CLOUD v9</span></h1>
            <div class="text-[10px] bg-slate-800 px-3 py-1 rounded-full border border-slate-700">
                LISTA LOCAL: <span id="local-count" class="text-blue-400 font-bold">0</span> BULTOS
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6 max-w-4xl">
        
        <div class="bg-white rounded-2xl shadow-xl border-4 border-blue-600 p-4 mb-6 no-print">
            <input type="text" id="pda-input" class="w-full p-4 text-3xl text-center font-black bg-slate-50 rounded-xl outline-none" placeholder="SCANNER PDA" autofocus>
            <div id="pda-feedback" class="hidden mt-4 p-4 rounded-xl text-center font-bold text-lg"></div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6 no-print">
            <div class="bg-white p-3 rounded-xl border border-slate-200 text-center shadow-sm">
                <span class="text-[9px] font-bold text-slate-400 uppercase block">No Ficheiro</span>
                <span id="count-total" class="text-xl font-black text-slate-800">0</span>
            </div>
            <div class="bg-emerald-600 p-3 rounded-xl text-white text-center shadow-md">
                <span class="text-[9px] font-bold opacity-80 uppercase block">Picados Hoje</span>
                <span id="count-scanned" class="text-xl font-black">0</span>
            </div>
            <div class="bg-rose-500 p-3 rounded-xl text-white text-center shadow-md">
                <span class="text-[9px] font-bold opacity-80 uppercase block">Faltam</span>
                <span id="count-missing" class="text-xl font-black">0</span>
            </div>
            <div class="bg-white p-3 rounded-xl border border-slate-200 text-center shadow-sm">
                <span class="text-[9px] font-bold text-slate-400 uppercase block">Acuracidade</span>
                <span id="count-percent" class="text-xl font-black text-slate-800">0%</span>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-md border border-slate-200 overflow-hidden">
            <div class="p-3 bg-slate-50 border-b flex justify-between items-center no-print">
                <div class="flex gap-1">
                    <button onclick="renderList('all')" class="px-3 py-1.5 text-[10px] font-bold rounded bg-white border shadow-sm uppercase">Tudo</button>
                    <button onclick="renderList('pending')" class="px-3 py-1.5 text-[10px] font-bold rounded bg-white border text-red-500 shadow-sm uppercase">Faltam (Baixa)</button>
                </div>
                <button onclick="window.print()" class="bg-slate-800 text-white text-[10px] px-4 py-2 rounded-lg font-bold uppercase">🖨️ Imprimir Relatório</button>
            </div>
            <div id="inventory-list" class="max-h-[600px] overflow-y-auto divide-y divide-slate-100 font-mono text-sm"></div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBKX8PGxZYyxhIUyAcWs4PK32zywpMnNE",
            authDomain: "iventariog2.firebaseapp.com",
            projectId: "iventariog2",
            storageBucket: "iventariog2.firebasestorage.app",
            messagingSenderId: "457215099810",
            appId: "1:457215099810:web:438eb2f75ec3fcdc5aa8fb",
            measurementId: "G-TKLR7373KJ"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const picagensRef = db.collection("picagens_diarias");
        
        let lidosNaBase = {}; // Só bultos que foram picados no Firebase
        let activeFilter = 'all';

        // 1. CARREGAR DADOS DO FICHEIRO DADOS.JS
        document.getElementById('local-count').innerText = listaBultosOFICIAL.length;
        document.getElementById('count-total').innerText = listaBultosOFICIAL.length;

        // 2. ESCUTAR APENAS AS PICAGENS (Economia de Leituras!)
        // Ele lê apenas os documentos que foram criados hoje ou recentemente
        picagensRef.onSnapshot((snap) => {
            lidosNaBase = {};
            snap.forEach(doc => { lidosNaBase[doc.id] = doc.data(); });
            renderList(activeFilter);
        });

        // 3. VALIDAR PICAGEM
        async function validate(code) {
            const feedback = document.getElementById('pda-feedback');
            feedback.className = "mt-4 p-4 rounded-xl text-center font-bold text-lg block";
            
            // Verifica se o código existe na lista do dados.js
            const existeNoFicheiro = listaBultosOFICIAL.includes(code);

            if (existeNoFicheiro) {
                if (lidosNaBase[code]) {
                    feedback.innerText = "⚠️ JÁ FOI PICADO: " + code;
                    feedback.classList.add('bg-amber-500', 'text-white');
                    beep(300, 0.1);
                } else {
                    // Grava no Firebase (Aqui gasta 1 escrita)
                    await picagensRef.doc(code).set({
                        t: new Date().toLocaleTimeString('pt-PT'),
                        data: new Date().toLocaleDateString('pt-PT'),
                        user: 'Hamilton'
                    });
                    feedback.innerText = "✅ OK: " + code;
                    feedback.classList.add('bg-emerald-600', 'text-white');
                    beep(600, 0.1);
                }
            } else {
                feedback.innerText = "❌ NÃO CONSTA NO FICHEIRO: " + code;
                feedback.classList.add('bg-rose-600', 'text-white');
                beep(150, 0.5);
            }
        }

        function renderList(filter) {
            activeFilter = filter;
            const container = document.getElementById('inventory-list');
            container.innerHTML = "";
            let picadosCount = 0;

            listaBultosOFICIAL.sort().forEach(key => {
                const isPicado = lidosNaBase[key];
                if (isPicado) picadosCount++;

                if (filter === 'pending' && isPicado) return;

                const div = document.createElement('div');
                div.className = `p-3 flex justify-between items-center ${isPicado ? 'row-ok' : 'row-pending'}`;
                div.innerHTML = `
                    <span class="font-bold text-xs">${key}</span>
                    <span class="text-[9px] font-black uppercase px-2 py-1 rounded border ${isPicado ? 'border-emerald-200 text-emerald-600' : 'border-rose-100 text-rose-500'}">
                        ${isPicado ? 'LIDO ' + isPicado.t : 'PENDENTE'}
                    </span>`;
                container.appendChild(div);
            });

            document.getElementById('count-scanned').innerText = picadosCount;
            document.getElementById('count-missing').innerText = listaBultosOFICIAL.length - picadosCount;
            const pct = Math.round((picadosCount / listaBultosOFICIAL.length) * 100) || 0;
            document.getElementById('count-percent').innerText = pct + "%";
        }

        function beep(f, d) { try { const c = new (window.AudioContext || window.webkitAudioContext)(); const o = c.createOscillator(); const g = c.createGain(); o.connect(g); g.connect(c.destination); o.frequency.value = f; o.start(); setTimeout(() => o.stop(), d * 1000); } catch(e) {} }

        document.getElementById('pda-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') { validate(e.target.value.trim()); e.target.value = ""; }
        });
    </script>
</body>
</html>
