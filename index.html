<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamil Inventory Turbo | v6.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .row-ok { border-left: 5px solid #10b981; background-color: #f0fdf4; }
        .row-pending { border-left: 5px solid #ef4444; background-color: #fff; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-10 text-slate-900">

    <header class="bg-slate-900 text-white shadow-xl sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-black tracking-tighter text-blue-400">GAMIL <span class="text-white">TURBO</span></h1>
            <div id="sync-status" class="text-[10px] bg-green-500/20 text-green-400 px-3 py-1 rounded-full border border-green-500/50">Sincronizado</div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6 max-w-4xl">
        <nav class="flex bg-white rounded-xl p-1 shadow-sm mb-6 border border-slate-200">
            <button onclick="switchTab('import')" id="btn-import" class="flex-1 py-3 rounded-lg text-sm font-bold bg-slate-900 text-white transition-all uppercase">1. Carga</button>
            <button onclick="switchTab('scan')" id="btn-scan" class="flex-1 py-3 rounded-lg text-sm font-bold text-slate-500 transition-all uppercase">2. PDA</button>
            <button onclick="switchTab('history')" id="btn-history" class="flex-1 py-3 rounded-lg text-sm font-bold text-slate-500 transition-all uppercase">3. Histórico</button>
        </nav>

        <section id="sec-import" class="block space-y-4">
            <div class="bg-white rounded-2xl shadow-xl border border-slate-200 p-6 text-center">
                <h2 class="text-lg font-bold mb-4">Importação Instantânea (8k+)</h2>
                <textarea id="bultos-input" rows="8" class="w-full p-4 border-2 border-slate-100 rounded-xl bg-slate-50 font-mono text-xs mb-4 outline-none focus:border-blue-500" placeholder="Cole os bultos aqui..."></textarea>
                <div class="flex gap-2">
                    <button id="btn-process" onclick="processImport()" class="flex-[2] bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700">SUBIR PARA NUVEM</button>
                    <button onclick="purgeCloud()" class="flex-1 bg-red-50 text-red-600 font-bold rounded-xl border border-red-100">LIMPAR</button>
                </div>
            </div>
        </section>

        <section id="sec-scan" class="hidden space-y-4">
            <div class="bg-white rounded-2xl shadow-xl border-4 border-blue-600 p-4">
                <input type="text" id="pda-input" class="w-full p-4 text-3xl text-center font-black bg-slate-100 rounded-xl outline-none" placeholder="SCANNER" autofocus>
                <div id="pda-feedback" class="hidden mt-4 p-4 rounded-xl text-center font-bold text-lg"></div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-white p-4 rounded-xl border shadow-sm text-center">
                    <span class="text-[10px] font-bold text-slate-400 uppercase block">Total</span>
                    <span id="count-total" class="text-2xl font-black">0</span>
                </div>
                <div class="bg-emerald-600 p-4 rounded-xl text-white text-center shadow-md">
                    <span class="text-[10px] font-bold opacity-80 uppercase block">Lidos</span>
                    <span id="count-scanned" class="text-2xl font-black">0</span>
                </div>
                <div class="bg-rose-500 p-4 rounded-xl text-white text-center shadow-md">
                    <span class="text-[10px] font-bold opacity-80 uppercase block">Faltam</span>
                    <span id="count-missing" class="text-2xl font-black">0</span>
                </div>
                <div class="bg-white p-4 rounded-xl border shadow-sm text-center text-slate-800">
                    <span class="text-[10px] font-bold text-slate-400 uppercase block">Acuracidade</span>
                    <span id="count-percent" class="text-2xl font-black">0%</span>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-md border overflow-hidden">
                <div class="p-4 bg-slate-50 border-b flex justify-between items-center">
                    <div class="flex gap-2">
                        <button onclick="renderList('all')" class="text-[10px] font-bold bg-white border px-3 py-2 rounded shadow-sm">TUDO</button>
                        <button onclick="renderList('pending')" class="text-[10px] font-bold bg-white border px-3 py-2 rounded text-red-500 shadow-sm">PENDENTES</button>
                    </div>
                    <button onclick="saveToHistory()" class="bg-slate-800 text-white text-[10px] px-3 py-2 rounded font-bold uppercase shadow-sm">Fechar Mês</button>
                </div>
                <div id="inventory-list" class="max-h-[400px] overflow-y-auto divide-y font-mono text-sm"></div>
            </div>
        </section>

        <section id="sec-history" class="hidden space-y-4">
            <div id="history-container" class="space-y-3"></div>
        </section>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBEJpvsh0A2wFIMINGLJx7L0jrXXLcRizk",
            authDomain: "gamil-inventory.firebaseapp.com",
            projectId: "gamil-inventory",
            storageBucket: "gamil-inventory.firebasestorage.app",
            messagingSenderId: "1057783338000",
            appId: "1:1057783338000:web:09d77f4736d2416bd42695"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const docRef = db.collection("app").doc("inventario_atual");
        const histRef = db.collection("historico");

        let inventory = {};

        // SINCRONIZAÇÃO EM TEMPO REAL (MUITO MAIS RÁPIDA)
        docRef.onSnapshot((doc) => {
            if (doc.exists) {
                inventory = doc.data().dados || {};
                renderList('all');
            }
        });

        // CARGA INSTANTÂNEA
        async function processImport() {
            const raw = document.getElementById('bultos-input').value;
            const lines = [...new Set(raw.split(/[\n\r,]+/).map(l => l.trim()).filter(l => l !== ""))];
            if(lines.length === 0) return alert("Lista vazia!");

            const btn = document.getElementById('btn-process');
            btn.disabled = true; btn.innerText = "PROCESSANDO...";

            const novoPack = {};
            lines.forEach(code => novoPack[code] = { s: 'p', t: null }); // s: status, t: time

            try {
                // Salva tudo de uma vez num único documento
                await docRef.set({ dados: novoPack });
                alert(`✅ ${lines.length} bultos carregados instantaneamente!`);
            } catch (e) { alert("Erro ao salvar. Verifique se as REGRAS do Firebase estão IF TRUE."); }

            btn.disabled = false; btn.innerText = "SUBIR PARA NUVEM";
            document.getElementById('bultos-input').value = "";
            switchTab('scan');
        }

        // SCANNER PDA
        const pdaInput = document.getElementById('pda-input');
        pdaInput.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const code = pdaInput.value.trim();
                if(code) validate(code);
                pdaInput.value = "";
            }
        });

        async function validate(code) {
            const f = document.getElementById('pda-feedback');
            f.className = "mt-4 p-4 rounded-xl text-center font-bold text-lg block";
            
            if (inventory[code]) {
                if (inventory[code].s === 'ok') {
                    f.innerText = "⚠️ JÁ LIDO: " + code; f.classList.add('bg-amber-500', 'text-white'); beep(300, 0.1);
                } else {
                    inventory[code].s = 'ok';
                    inventory[code].t = new Date().toLocaleTimeString();
                    await docRef.update({ [`dados.${code}`]: inventory[code] });
                    f.innerText = "✅ OK: " + code; f.classList.add('bg-emerald-500', 'text-white'); beep(600, 0.1);
                }
            } else {
                f.innerText = "❌ DESCONHECIDO: " + code; f.classList.add('bg-rose-600', 'text-white'); beep(150, 0.5);
            }
        }

        function renderList(filter) {
            const container = document.getElementById('inventory-list');
            container.innerHTML = "";
            let c = { total: 0, ok: 0 };

            Object.keys(inventory).sort().reverse().forEach(key => {
                c.total++;
                if(inventory[key].s === 'ok') c.ok++;
                if(filter === 'pending' && inventory[key].s === 'ok') return;

                const div = document.createElement('div');
                div.className = `p-3 flex justify-between items-center ${inventory[key].s === 'ok' ? 'row-ok' : 'row-pending'}`;
                div.innerHTML = `<span class="font-bold">${key}</span><span class="text-[9px] uppercase font-black">${inventory[key].s === 'ok' ? 'Lido' : 'Falta'}</span>`;
                container.appendChild(div);
            });

            document.getElementById('count-total').innerText = c.total;
            document.getElementById('count-scanned').innerText = c.ok;
            document.getElementById('count-missing').innerText = c.total - c.ok;
            document.getElementById('count-percent').innerText = c.total > 0 ? Math.round((c.ok / c.total)*100) + "%" : "0%";
        }

        async function saveToHistory() {
            const okKeys = Object.keys(inventory).filter(k => inventory[k].s === 'ok');
            if(okKeys.length === 0) return alert("Nada para arquivar.");
            if(confirm("Fechar inventário atual?")) {
                await histRef.add({ data: new Date().toLocaleDateString(), total: okKeys.length, ts: Date.now() });
                alert("Arquivado!");
            }
        }

        async function purgeCloud() { if(confirm("Apagar tudo na nuvem?")) await docRef.delete(); }

        function switchTab(tab) {
            ['import', 'scan', 'history'].forEach(t => document.getElementById(`sec-${t}`).classList.add('hidden'));
            document.getElementById(`sec-${tab}`).classList.remove('hidden');
            if(tab === 'scan') setTimeout(() => pdaInput.focus(), 200);
            if(tab === 'history') renderHistory();
        }

        function renderHistory() {
            histRef.orderBy('ts', 'desc').get().then(snap => {
                const container = document.getElementById('history-container');
                container.innerHTML = snap.empty ? "Vazio." : "";
                snap.forEach(doc => {
                    const h = doc.data();
                    container.innerHTML += `<div class="p-4 bg-white border rounded-xl flex justify-between items-center">
                        <span class="font-bold">${h.data}</span><span class="font-bold text-emerald-600">${h.total} BULTOS</span>
                    </div>`;
                });
            });
        }

        function beep(f, d) { try { const c = new AudioContext(); const o = c.createOscillator(); const g = c.createGain(); o.connect(g); g.connect(c.destination); o.frequency.value = f; o.start(); setTimeout(() => o.stop(), d * 1000); } catch(e) {} }
    </script>
</body>
</html>
